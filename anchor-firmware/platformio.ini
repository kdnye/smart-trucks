; FSI BLE anchor firmware — M5Stack ATOM Lite (ESP32-PICO-D4).
;
; One binary, two roles (persisted in NVS):
;   anchor  — scans BLE asset beacons, ships aggregated RSSI batches to the
;             gateway over ESP-NOW.
;   gateway — receives ESP-NOW frames from anchors, emits NDJSON over USB
;             serial to the Pi's anchor-bridge co-process. Also scans BLE
;             itself (it is a vantage point too).
;
; Build/flash:  pio run -t upload   (then `pio device monitor` at 115200)
; Role select:  serial command `role gateway` / `role anchor`, or hold the
;               front button while powering on to toggle.

[env:m5stack-atom]
platform = espressif32@^6.7.0
board = m5stack-atom
framework = arduino
monitor_speed = 115200
build_flags =
    -DFW_VERSION_STR=\"1.0.0\"
    -DCORE_DEBUG_LEVEL=1
lib_deps =
    h2zero/NimBLE-Arduino@^1.4.2
    fastled/FastLED@^3.6.0
    bblanchon/ArduinoJson@^7.0.4
