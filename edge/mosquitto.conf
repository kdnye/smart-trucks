# Local-only MQTT broker for the anchor pipeline (anchor-bridge publishes the
# gateway ATOM's frames; ble-sensor's anchor ingest subscribes). The edge
# container runs with host networking, so bind strictly to loopback — nothing
# off-device may reach this broker.
listener 1883 127.0.0.1
allow_anonymous true
persistence false
# Keep the broker quiet on the 512 MB Pi Zero 2 W.
log_dest stdout
log_type error
log_type warning
max_queued_messages 1000
