version: '2.1'
services:
  ble-sensor:
    build: ./ble-sensor
    privileged: true
    network_mode: "host"
    restart: always
    labels:
      io.balena.features.dbus: '1'
    volumes:
      - telematics_data:/data
    environment:
      - ANONYMIZE_MAC=false
      - INCLUDE_DEVICE_NAME=true
      - WEBHOOK_URL=${WEBHOOK_URL}
      - VEHICLE_ID=${VEHICLE_ID}
      - API_KEY=${API_KEY}
      - SCAN_DURATION_SECONDS=30
      - POLL_INTERVAL=35

  telematics-edge:
    build:
      context: .
      dockerfile: telematics-edge/Dockerfile
    privileged: true
    restart: always
    labels:
      io.balena.features.dbus: '1'
    devices:
      - "/dev/i2c-1:/dev/i2c-1"
      - "/dev/ttyAMA0:/dev/ttyAMA0"
    volumes:
      - telematics_data:/data
    cpuset: "1,2"
    environment:
      - UDEV=1
      - WEBHOOK_URL=${WEBHOOK_URL}
      - VEHICLE_ID=${VEHICLE_ID}
      - API_KEY=${API_KEY}
      - GPS_SERIAL_DEVICE=/dev/ttyAMA0


  power-monitor:
    build:
      context: .
      dockerfile: power-monitor/Dockerfile
    privileged: true
    restart: always
    devices:
      - "/dev/i2c-1:/dev/i2c-1"
    volumes:
      - telematics_data:/data
    cpuset: "3"
    environment:
      - UDEV=1
      - WEBHOOK_URL=${WEBHOOK_URL}
      - VEHICLE_ID=${VEHICLE_ID}
      - API_KEY=${API_KEY}
      - UPS_BATTERY_CAPACITY_MAH=${UPS_BATTERY_CAPACITY_MAH:-4400}

volumes:
  telematics_data:
