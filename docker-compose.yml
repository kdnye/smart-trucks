version: '2.1'
services:
  gps-multiplexer:
    build:
      context: .
      dockerfile: gps-multiplexer/Dockerfile
    privileged: true
    restart: always
    entrypoint: ["/usr/local/bin/start.sh"]
    devices:
      - "/dev/serial0:/dev/serial0"
      - "/dev/ttyAMA0:/dev/ttyAMA0"
      - "/dev/ttyS0:/dev/ttyS0"
    environment:
      - UDEV=1
      - GPS_SERIAL_DEVICE=/dev/serial0
      - GPS_SERIAL_CANDIDATES=/dev/serial0,/dev/ttyAMA0,/dev/ttyS0

  telematics-edge:
    build:
      context: .
      dockerfile: telematics-edge/Dockerfile
    privileged: true
    restart: always
    # Wait for gps-multiplexer to be created so its service name is registered
    # in the bridge-network DNS before we start dialing `tcp://gps-multiplexer:2947`.
    depends_on:
      - gps-multiplexer
    labels:
      io.balena.features.dbus: '1'
      # Sentry Mode needs to stop/start ble-sensor + sync-service via the local
      # Balena Supervisor API. This label injects BALENA_SUPERVISOR_ADDRESS /
      # BALENA_SUPERVISOR_API_KEY / BALENA_APP_ID into the container.
      io.balena.features.supervisor-api: '1'
    devices:
      - "/dev/i2c-1:/dev/i2c-1"     # Grants access to the IMU
    volumes:
      - shared-sqlite:/data
    cpuset: "1,2"
    environment:
      - UDEV=1
      - VEHICLE_ID=${VEHICLE_ID}
      - DB_PATH=/data/telematics.db
      - GPS_SERIAL_DEVICE=tcp://gps-multiplexer:2947
      # Power saving: throttle IMU polling while parked (full 10Hz rate resumes
      # on motion). Larger = lower overnight draw, slower motion-wake latency.
      - IMU_PARKED_SAMPLE_INTERVAL_SECONDS=${IMU_PARKED_SAMPLE_INTERVAL_SECONDS:-1.0}
      # GPS track filter (see telematics-edge/gps_filter.py). Suppresses parked
      # multipath drift ("starburst") at the source and logs a dense track while
      # moving. Sampling is adaptive: ~1 point/sec while moving, throttled to
      # GPS_SAMPLE_INTERVAL_SECONDS while parked. All optional — code defaults
      # apply when unset.
      #   SAMPLE_INTERVAL_SECONDS:        parked/throttled cadence (also the base)
      #   MOVING_SAMPLE_INTERVAL_SECONDS: cadence while moving (>=1 pt/sec)
      #   STATIONARY_SPEED_KMH: at/above this the truck may be "moving"
      #   STATIONARY_RADIUS_M:  must displace beyond this (and read as moving) to
      #                         leave the parked state — rejects drift/speed-noise
      #   MIN_TRACK_DISTANCE_M: "real progress" distance for stop detection
      #   STATIONARY_HOLD_SECONDS: no-progress time before declaring a stop
      #   MAX_HDOP:             reject fixes worse than this HDOP (0 = off)
      #   TRACK_KEEPALIVE_SECONDS: emit one pinned breadcrumb per N s parked (0 = off)
      - GPS_SAMPLE_INTERVAL_SECONDS=${GPS_SAMPLE_INTERVAL_SECONDS:-5}
      - GPS_MOVING_SAMPLE_INTERVAL_SECONDS=${GPS_MOVING_SAMPLE_INTERVAL_SECONDS:-1.0}
      - GPS_STATIONARY_SPEED_KMH=${GPS_STATIONARY_SPEED_KMH:-5.0}
      - GPS_STATIONARY_RADIUS_M=${GPS_STATIONARY_RADIUS_M:-20.0}
      - GPS_MIN_TRACK_DISTANCE_M=${GPS_MIN_TRACK_DISTANCE_M:-8.0}
      - GPS_STATIONARY_HOLD_SECONDS=${GPS_STATIONARY_HOLD_SECONDS:-8.0}
      - GPS_MAX_HDOP=${GPS_MAX_HDOP:-0.0}
      - GPS_TRACK_KEEPALIVE_SECONDS=${GPS_TRACK_KEEPALIVE_SECONDS:-0.0}
      # Sentry Mode (software sleep). When enabled, after the truck is idle for
      # SENTRY_IDLE_TIMEOUT_SECONDS the heavy containers in SENTRY_PAUSE_SERVICES
      # are stopped via the Balena Supervisor API to cut power, and restarted on
      # motion/charging/WiFi. Opt-in: default off. See docs/power-optimization.md.
      #   SENTRY_PAUSE_SERVICES: comma list; set to "ble-sensor" to keep cloud
      #                          sync alive (visibility) instead of max savings.
      - SENTRY_MODE_ENABLED=${SENTRY_MODE_ENABLED:-false}
      - SENTRY_IDLE_TIMEOUT_SECONDS=${SENTRY_IDLE_TIMEOUT_SECONDS:-300}
      - SENTRY_WAKE_INTERVAL_SECONDS=${SENTRY_WAKE_INTERVAL_SECONDS:-10}
      - SENTRY_SYNC_FLUSH_GRACE_SECONDS=${SENTRY_SYNC_FLUSH_GRACE_SECONDS:-90}
      - SENTRY_PAUSE_SERVICES=${SENTRY_PAUSE_SERVICES:-ble-sensor,sync-service}

  ble-sensor:
    build:
      context: .
      dockerfile: ble-sensor/Dockerfile
    network_mode: host
    privileged: true
    restart: always
    labels:
      io.balena.features.dbus: '1'
    devices:
      - "/dev/i2c-1:/dev/i2c-1"     # Grants access to shared I2C bus
    volumes:
      - shared-sqlite:/data
    environment:
      - UDEV=1
      - ANONYMIZE_MAC=false
      - INCLUDE_DEVICE_NAME=true
      - VEHICLE_ID=${VEHICLE_ID}
      - SCAN_CONTENTION_BACKOFF_CAP_SECONDS=12
      - SCAN_CONTENTION_COOLDOWN_THRESHOLD=3
      - SCAN_DURATION_SECONDS=20
      - POLL_INTERVAL=60
      - TELEMATICS_DB_PATH=/data/telematics.db
      - UPLOAD_BATCH_SIZE=${BLE_UPLOAD_BATCH_SIZE:-25}
      # Battery saver disabled: power-monitor is removed in the base-model stack,
      # so there is no power_readings source. ble-sensor runs at full scan cadence.
      - BLE_BATTERY_SAVER_ENABLED=${BLE_BATTERY_SAVER_ENABLED:-false}
      - BLE_POLL_INTERVAL_DISCHARGING_SECONDS=${BLE_POLL_INTERVAL_DISCHARGING_SECONDS:-300}
      - BLE_POLL_INTERVAL_LOW_BATTERY_SECONDS=${BLE_POLL_INTERVAL_LOW_BATTERY_SECONDS:-900}
      - BLE_LOW_BATTERY_SOC_PCT=${BLE_LOW_BATTERY_SOC_PCT:-25}
      - BLE_SCAN_DURATION_LOW_POWER_SECONDS=${BLE_SCAN_DURATION_LOW_POWER_SECONDS:-10}

  sync-service:
    build:
      context: .
      dockerfile: sync-service/Dockerfile
    restart: always
    volumes:
      - shared-sqlite:/data
    environment:
      - VEHICLE_ID=${VEHICLE_ID}
      - WEBHOOK_URL=${WEBHOOK_URL}
      - EDGE_INGEST_KEY=${EDGE_INGEST_KEY}
      - DB_PATH=/data/telematics.db
      # Store-and-forward draining. After an offline stretch the queue clears in
      # minutes, not hours: a saturated cycle keeps draining back-to-back
      # (DRAIN_DELAY) instead of sleeping the full INTERVAL, and a priority
      # beacon ships the current position first so the map shows the truck
      # "online and here" while history backfills behind it.
      - SYNC_INTERVAL_SECONDS=${SYNC_INTERVAL_SECONDS:-60}
      # Bounded batches keep peak memory low while draining a backlog on the
      # 512MB Pi; ble_scans use a smaller batch since their payloads are larger.
      - SYNC_BATCH_SIZE=${SYNC_BATCH_SIZE:-100}
      - SYNC_BLE_BATCH_SIZE=${SYNC_BLE_BATCH_SIZE:-50}
      - SYNC_DRAIN_DELAY_SECONDS=${SYNC_DRAIN_DELAY_SECONDS:-0.5}
      - SYNC_PRIORITY_BEACON_ENABLED=${SYNC_PRIORITY_BEACON_ENABLED:-true}

  # imu-calibration / ble-calibration are intentionally NOT in the base release.
  # They are dormant one-shot tools (exit immediately when ENABLE_CALIBRATION is
  # false), and a `restart: "no"` exited service makes the Balena supervisor
  # re-reconcile it every ~15 min — wasted I/O + memory churn on the 512MB Pi.
  # The imu-calibration/ and ble-calibration/ directories remain in the repo; to
  # run a calibration session, re-add the service here temporarily and set
  # ENABLE_CALIBRATION=true (see docs/EDGE_REBUILD_RECORD.md).

  health:
    build: ./health
    ports:
      - "8080:8080"
    restart: always
    environment:
      - SERVICE_NAME=smart-trucks

  wifi-provisioner:
    build:
      context: .
      dockerfile: wifi-provisioner/Dockerfile
    # host networking is required so the container can bind :80 on the AP
    # interface NM brings up, and reach the host dbus that NetworkManager owns.
    network_mode: host
    privileged: true
    restart: always
    labels:
      io.balena.features.dbus: '1'
      io.balena.features.supervisor-api: '1'
    volumes:
      - shared-sqlite:/data
    environment:
      - VEHICLE_ID=${VEHICLE_ID}
      - WIFI_PROVISIONER_SETUP_SSID=${WIFI_PROVISIONER_SETUP_SSID:-}
      - WIFI_PROVISIONER_SETUP_PSK=${WIFI_PROVISIONER_SETUP_PSK:-}
      - WIFI_PROVISIONER_SETUP_PIN=${WIFI_PROVISIONER_SETUP_PIN:-}
      - WIFI_PROVISIONER_GRACE_SECONDS=${WIFI_PROVISIONER_GRACE_SECONDS:-180}
      - WIFI_PROVISIONER_CHECK_INTERVAL_SECONDS=${WIFI_PROVISIONER_CHECK_INTERVAL_SECONDS:-30}
      - WIFI_PROVISIONER_HOTSPOT_RETRY_INTERVAL_SECONDS=${WIFI_PROVISIONER_HOTSPOT_RETRY_INTERVAL_SECONDS:-120}
      - WIFI_PROVISIONER_HOTSPOT_RETRY_PROBE_SECONDS=${WIFI_PROVISIONER_HOTSPOT_RETRY_PROBE_SECONDS:-45}

volumes:
  shared-sqlite:
