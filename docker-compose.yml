version: '2.1'
services:
  telematics-edge:
    build:
      context: .
      dockerfile: telematics-edge/Dockerfile
    privileged: true
    restart: always
    labels:
      io.balena.features.dbus: '1'
    devices:
      - "/dev/i2c-1:/dev/i2c-1"     # Grants access to the IMU
      - "/dev/serial0:/dev/serial0" # Grants access to the GPS
    volumes:
      - telematics_data:/data
    cpuset: "1,2"
    environment:
      - UDEV=1
      - WEBHOOK_URL=${WEBHOOK_URL}
      - VEHICLE_ID=${VEHICLE_ID}
      - API_KEY=${API_KEY}
      - GPS_SERIAL_DEVICE=/dev/serial0

  power-monitor:
    build:
      context: .
      dockerfile: power-monitor/Dockerfile
    privileged: true
    restart: always
    devices:
      - "/dev/i2c-1:/dev/i2c-1"     # Grants access to the UPS HAT
      - "/dev/serial0:/dev/serial0" # Grants access to the GPS serial
    volumes:
      - telematics_data:/data
    cpuset: "3"
    environment:
      - UDEV=1
      - WEBHOOK_URL=${WEBHOOK_URL}
      - VEHICLE_ID=${VEHICLE_ID}
      - API_KEY=${API_KEY}
      - UPS_BATTERY_CAPACITY_MAH=${UPS_BATTERY_CAPACITY_MAH:-4400}

  ble-sensor:
    build:
      context: .
      dockerfile: ble-sensor/Dockerfile
    network_mode: host
    privileged: true
    restart: always
    labels:
      io.balena.features.dbus: '1'
    devices:
      - "/dev/i2c-1:/dev/i2c-1"     # Grants access to shared I2C bus
      - "/dev/serial0:/dev/serial0" # Grants access to the GPS serial
    volumes:
      - telematics_data:/data
    environment:
      - ANONYMIZE_MAC=false
      - INCLUDE_DEVICE_NAME=true
      - WEBHOOK_URL=${WEBHOOK_URL}
      - VEHICLE_ID=${VEHICLE_ID}
      - API_KEY=${API_KEY}
      - SCAN_DURATION_SECONDS=30
      - POLL_INTERVAL=35

  gps-multiplexer:
    build:
      context: .
      dockerfile: gps-multiplexer/Dockerfile
    privileged: true
    restart: always
    devices:
      - "/dev/serial0:/dev/serial0" # GPS serial port upstream
    environment:
      - GPS_UPSTREAM_DEVICE=/dev/serial0
      - GPS_VIRTUAL_DEVICE=/dev/virtual/gps_stream

volumes:
  telematics_data:
