version: '2.1'
services:
  ble-sensor:
    build: ./ble-sensor
    image: smart-truck/ble-sensor:latest
    privileged: true
    network_mode: "host"
    restart: always
    labels:
      io.balena.features.dbus: '1'
    environment:
      - ANONYMIZE_MAC=false
      - INCLUDE_DEVICE_NAME=true
      - WEBHOOK_URL=${WEBHOOK_URL}
      - VEHICLE_ID=${VEHICLE_ID}
      - API_KEY=${API_KEY}

  telematics-edge:
    build: ./telematics-edge
    image: smart-truck/telematics-edge:latest
    privileged: true
    restart: always
    devices:
      - "/dev/serial0:/dev/serial0"
      - "/dev/i2c-1:/dev/i2c-1"
    environment:
      - WEBHOOK_URL=${WEBHOOK_URL}
      - VEHICLE_ID=${VEHICLE_ID}
      - API_KEY=${API_KEY}
