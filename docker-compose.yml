version: '2.1'
services:
  gps-multiplexer:
    build:
      context: .
      dockerfile: gps-multiplexer/Dockerfile
    privileged: true
    restart: always
    entrypoint: ["/usr/local/bin/start.sh"]
    devices:
      - "/dev/serial0:/dev/serial0"
      - "/dev/ttyAMA0:/dev/ttyAMA0"
      - "/dev/ttyS0:/dev/ttyS0"
    environment:
      - UDEV=1
      - GPS_SERIAL_DEVICE=/dev/serial0
      - GPS_SERIAL_CANDIDATES=/dev/serial0,/dev/ttyAMA0,/dev/ttyS0

  telematics-edge:
    build:
      context: .
      dockerfile: telematics-edge/Dockerfile
    privileged: true
    restart: always
    labels:
      io.balena.features.dbus: '1'
    devices:
      - "/dev/i2c-1:/dev/i2c-1"     # Grants access to the IMU
    volumes:
      - telematics_data:/data
    cpuset: "1,2"
    environment:
      - UDEV=1
      - WEBHOOK_URL=${WEBHOOK_URL}
      - VEHICLE_ID=${VEHICLE_ID}
      - API_KEY=${API_KEY}
      - DB_PATH=/data/telematics.db
      - GPS_SERIAL_DEVICE=tcp://gps-multiplexer:2947

  power-monitor:
    build:
      context: .
      dockerfile: power-monitor/Dockerfile
    privileged: true
    restart: always
    devices:
      - "/dev/i2c-1:/dev/i2c-1"     # Grants access to the UPS HAT
    volumes:
      - telematics_data:/data
    cpuset: "3"
    environment:
      - UDEV=1
      - WEBHOOK_URL=${WEBHOOK_URL}
      - VEHICLE_ID=${VEHICLE_ID}
      - API_KEY=${API_KEY}
      - DB_PATH=/data/telematics.db
      - TELEMATICS_DB_PATH=/data/telematics.db
      - UPS_BATTERY_CAPACITY_MAH=${UPS_BATTERY_CAPACITY_MAH:-4400}
      - UPS_MAX_EXPECTED_AMPS=${UPS_MAX_EXPECTED_AMPS:-4.0}
      - UPS_GAIN_STRATEGY=${UPS_GAIN_STRATEGY:-auto}
      - UPS_BUS_VOLTAGE_RANGE_V=${UPS_BUS_VOLTAGE_RANGE_V:-32}

  ble-sensor:
    build:
      context: .
      dockerfile: ble-sensor/Dockerfile
    network_mode: host
    privileged: true
    restart: always
    labels:
      io.balena.features.dbus: '1'
    devices:
      - "/dev/i2c-1:/dev/i2c-1"     # Grants access to shared I2C bus
    volumes:
      - telematics_data:/data
    environment:
      - UDEV=1
      - ANONYMIZE_MAC=false
      - INCLUDE_DEVICE_NAME=true
      - WEBHOOK_URL=${WEBHOOK_URL}
      - VEHICLE_ID=${VEHICLE_ID}
      - API_KEY=${API_KEY}
      - SCAN_CONTENTION_BACKOFF_CAP_SECONDS=12
      - SCAN_CONTENTION_COOLDOWN_THRESHOLD=3
      - SCAN_DURATION_SECONDS=20
      - POLL_INTERVAL=60

  imu-calibration:
    build:
      context: .
      dockerfile: imu-calibration/Dockerfile
    privileged: true
    restart: "no"
    devices:
      - "/dev/i2c-1:/dev/i2c-1"
    volumes:
      - telematics_data:/data
    ports:
      - "8085:8080"
    environment:
      - UDEV=1
      - VEHICLE_ID=${VEHICLE_ID}
      - IMU_I2C_BUS=${IMU_I2C_BUS:-1}
      - IMU_CALIBRATION_SAMPLE_INTERVAL_SECONDS=${IMU_CALIBRATION_SAMPLE_INTERVAL_SECONDS:-0.05}

volumes:
  telematics_data:
