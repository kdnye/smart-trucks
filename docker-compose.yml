version: '2.1'
services:
  # Single edge data-plane container: telematics-edge (GPS/IMU/heartbeats + cloud
  # upload), ble-sensor (BLE scan), and sync-service (uploader) run as co-processes
  # (see edge/start.sh). Replaces the former gps-multiplexer + telematics-edge +
  # ble-sensor + sync-service services. GPS is read directly from the serial UART
  # (no multiplexer). Host networking is required for bleak/BlueZ over the host
  # D-Bus; it also means GPS comes straight off /dev/serial0.
  edge:
    build:
      context: .
      dockerfile: edge/Dockerfile
    network_mode: host
    privileged: true
    restart: always
    labels:
      io.balena.features.dbus: '1'
      # Sentry Mode + (future) self-heal use the local Balena Supervisor API.
      io.balena.features.supervisor-api: '1'
    devices:
      - "/dev/i2c-1:/dev/i2c-1"       # IMU
      - "/dev/serial0:/dev/serial0"   # GPS UART (primary)
      - "/dev/ttyAMA0:/dev/ttyAMA0"   # GPS UART (fallback)
      - "/dev/ttyS0:/dev/ttyS0"       # GPS UART (fallback)
    volumes:
      - shared-sqlite:/data
    environment:
      - UDEV=1
      - VEHICLE_ID=${VEHICLE_ID}
      - DB_PATH=/data/telematics.db
      - TELEMATICS_DB_PATH=/data/telematics.db
      # --- GPS: read the UART directly (gps-multiplexer removed) ---
      - GPS_SERIAL_DEVICE=/dev/serial0
      - GPS_SERIAL_CANDIDATES=/dev/serial0,/dev/ttyAMA0,/dev/ttyS0
      # GPS track filter (see telematics-edge/gps_filter.py): suppresses parked
      # multipath drift at the source and logs a dense track while moving.
      - GPS_SAMPLE_INTERVAL_SECONDS=${GPS_SAMPLE_INTERVAL_SECONDS:-5}
      - GPS_MOVING_SAMPLE_INTERVAL_SECONDS=${GPS_MOVING_SAMPLE_INTERVAL_SECONDS:-1.0}
      - GPS_STATIONARY_SPEED_KMH=${GPS_STATIONARY_SPEED_KMH:-5.0}
      - GPS_STATIONARY_RADIUS_M=${GPS_STATIONARY_RADIUS_M:-20.0}
      - GPS_MIN_TRACK_DISTANCE_M=${GPS_MIN_TRACK_DISTANCE_M:-8.0}
      - GPS_STATIONARY_HOLD_SECONDS=${GPS_STATIONARY_HOLD_SECONDS:-8.0}
      - GPS_MAX_HDOP=${GPS_MAX_HDOP:-0.0}
      - GPS_TRACK_KEEPALIVE_SECONDS=${GPS_TRACK_KEEPALIVE_SECONDS:-0.0}
      # IMU power saving: throttle polling while parked (full rate on motion).
      - IMU_PARKED_SAMPLE_INTERVAL_SECONDS=${IMU_PARKED_SAMPLE_INTERVAL_SECONDS:-1.0}
      # --- Sentry Mode (software sleep), opt-in (default off). When idle it sets
      # the SENTRY_SUSPEND_FLAG_PATH sentinel (container-local /run, NOT the
      # persistent /data volume); the in-process ble-sensor + sync-service loops
      # poll it and suspend (idle radio + stop uploads) until wake clears it.
      - SENTRY_MODE_ENABLED=${SENTRY_MODE_ENABLED:-false}
      - SENTRY_IDLE_TIMEOUT_SECONDS=${SENTRY_IDLE_TIMEOUT_SECONDS:-300}
      - SENTRY_WAKE_INTERVAL_SECONDS=${SENTRY_WAKE_INTERVAL_SECONDS:-10}
      - SENTRY_SYNC_FLUSH_GRACE_SECONDS=${SENTRY_SYNC_FLUSH_GRACE_SECONDS:-90}
      - SENTRY_SUSPEND_FLAG_PATH=${SENTRY_SUSPEND_FLAG_PATH:-/run/sentry_suspend}
      # --- BLE scanning (ble-sensor) ---
      - ANONYMIZE_MAC=false
      - INCLUDE_DEVICE_NAME=true
      - SCAN_CONTENTION_BACKOFF_CAP_SECONDS=12
      - SCAN_CONTENTION_COOLDOWN_THRESHOLD=3
      - SCAN_DURATION_SECONDS=20
      - POLL_INTERVAL=60
      - UPLOAD_BATCH_SIZE=${BLE_UPLOAD_BATCH_SIZE:-25}
      - BLE_BATTERY_SAVER_ENABLED=${BLE_BATTERY_SAVER_ENABLED:-false}
      - BLE_POLL_INTERVAL_DISCHARGING_SECONDS=${BLE_POLL_INTERVAL_DISCHARGING_SECONDS:-300}
      - BLE_POLL_INTERVAL_LOW_BATTERY_SECONDS=${BLE_POLL_INTERVAL_LOW_BATTERY_SECONDS:-900}
      - BLE_LOW_BATTERY_SOC_PCT=${BLE_LOW_BATTERY_SOC_PCT:-25}
      - BLE_SCAN_DURATION_LOW_POWER_SECONDS=${BLE_SCAN_DURATION_LOW_POWER_SECONDS:-10}
      # --- Cloud upload (sync-service) ---
      - WEBHOOK_URL=${WEBHOOK_URL}
      - EDGE_INGEST_KEY=${EDGE_INGEST_KEY}
      - SYNC_INTERVAL_SECONDS=${SYNC_INTERVAL_SECONDS:-60}
      - SYNC_BATCH_SIZE=${SYNC_BATCH_SIZE:-100}
      - SYNC_BLE_BATCH_SIZE=${SYNC_BLE_BATCH_SIZE:-50}
      - SYNC_DRAIN_DELAY_SECONDS=${SYNC_DRAIN_DELAY_SECONDS:-0.5}
      - SYNC_PRIORITY_BEACON_ENABLED=${SYNC_PRIORITY_BEACON_ENABLED:-true}

  # Network control plane: sole owner of wlan0/NetworkManager + the setup-AP
  # captive portal (see docs/WIFI_PROVISIONING.md), and the cross-service
  # watchdog that restarts the `edge` service via the Balena Supervisor API when
  # its heartbeats go stale. Also serves /healthz (absorbs the old `health`
  # container). Kept separate from the data plane so it stays up — and can
  # recover the edge — even when everything else is wedged or offline.
  wifi-provisioner:
    build:
      context: .
      dockerfile: wifi-provisioner/Dockerfile
    network_mode: host
    privileged: true
    restart: always
    labels:
      io.balena.features.dbus: '1'
      io.balena.features.supervisor-api: '1'
    volumes:
      - shared-sqlite:/data
    environment:
      - VEHICLE_ID=${VEHICLE_ID}
      - WIFI_PROVISIONER_SETUP_SSID=${WIFI_PROVISIONER_SETUP_SSID:-}
      - WIFI_PROVISIONER_SETUP_PSK=${WIFI_PROVISIONER_SETUP_PSK:-}
      - WIFI_PROVISIONER_SETUP_PIN=${WIFI_PROVISIONER_SETUP_PIN:-}
      - WIFI_PROVISIONER_GRACE_SECONDS=${WIFI_PROVISIONER_GRACE_SECONDS:-180}
      - WIFI_PROVISIONER_CHECK_INTERVAL_SECONDS=${WIFI_PROVISIONER_CHECK_INTERVAL_SECONDS:-30}
      - WIFI_PROVISIONER_HOTSPOT_RETRY_INTERVAL_SECONDS=${WIFI_PROVISIONER_HOTSPOT_RETRY_INTERVAL_SECONDS:-120}
      - WIFI_PROVISIONER_HOTSPOT_RETRY_PROBE_SECONDS=${WIFI_PROVISIONER_HOTSPOT_RETRY_PROBE_SECONDS:-45}
      # --- Cross-service watchdog (restarts the edge container on wedge) ---
      - WATCHDOG_ENABLED=${WATCHDOG_ENABLED:-true}
      - WATCHDOG_TARGET_SERVICE=${WATCHDOG_TARGET_SERVICE:-edge}
      - WATCHDOG_DB_PATH=/data/telematics.db
      - WATCHDOG_STALE_SECONDS=${WATCHDOG_STALE_SECONDS:-600}
      - WATCHDOG_CHECK_INTERVAL_SECONDS=${WATCHDOG_CHECK_INTERVAL_SECONDS:-120}
      - WATCHDOG_RESTART_COOLDOWN_SECONDS=${WATCHDOG_RESTART_COOLDOWN_SECONDS:-300}
      - WATCHDOG_BOOT_GRACE_SECONDS=${WATCHDOG_BOOT_GRACE_SECONDS:-300}

volumes:
  shared-sqlite:
