version: '2.1'
services:
  gps-multiplexer:
    build:
      context: .
      dockerfile: gps-multiplexer/Dockerfile
    privileged: true
    restart: always
    devices:
      - "/dev/serial0:/dev/serial0"
    environment:
      - UDEV=1
      - GPS_SERIAL_DEVICE=/dev/serial0
      - GPS_SERIAL_CANDIDATES=/dev/serial0

  telematics-edge:
    build:
      context: .
      dockerfile: telematics-edge/Dockerfile
    privileged: true
    restart: always
    labels:
      io.balena.features.dbus: '1'
    devices:
      - "/dev/i2c-1:/dev/i2c-1"     # Grants access to the IMU
    volumes:
      - telematics_data:/data
    cpuset: "1,2"
    environment:
      - UDEV=1
      - WEBHOOK_URL=${WEBHOOK_URL}
      - VEHICLE_ID=${VEHICLE_ID}
      - API_KEY=${API_KEY}
      - GPS_SERIAL_DEVICE=tcp://gps-multiplexer:2947

  power-monitor:
    build:
      context: .
      dockerfile: power-monitor/Dockerfile
    privileged: true
    restart: always
    devices:
      - "/dev/i2c-1:/dev/i2c-1"     # Grants access to the UPS HAT
    volumes:
      - telematics_data:/data
    cpuset: "3"
    environment:
      - UDEV=1
      - WEBHOOK_URL=${WEBHOOK_URL}
      - VEHICLE_ID=${VEHICLE_ID}
      - API_KEY=${API_KEY}
      - UPS_BATTERY_CAPACITY_MAH=${UPS_BATTERY_CAPACITY_MAH:-4400}

  ble-sensor:
    build:
      context: .
      dockerfile: ble-sensor/Dockerfile
    network_mode: host
    privileged: true
    restart: always
    labels:
      io.balena.features.dbus: '1'
    devices:
      - "/dev/i2c-1:/dev/i2c-1"     # Grants access to shared I2C bus
    volumes:
      - telematics_data:/data
    environment:
      - UDEV=1
      - ANONYMIZE_MAC=false
      - INCLUDE_DEVICE_NAME=true
      - WEBHOOK_URL=${WEBHOOK_URL}
      - VEHICLE_ID=${VEHICLE_ID}
      - API_KEY=${API_KEY}
      - SCAN_DURATION_SECONDS=30
      - POLL_INTERVAL=35

volumes:
  telematics_data:
