version: '2.1'
services:
  ble-sensor:
    build: ./ble-sensor
    image: smart-truck/ble-sensor:latest
    privileged: true
    network_mode: "host"
    restart: always
    labels:
      io.balena.features.dbus: '1'
    volumes:
      - telematics-data:/data
    environment:
      - ANONYMIZE_MAC=false
      - INCLUDE_DEVICE_NAME=true
      - WEBHOOK_URL=${WEBHOOK_URL}
      - VEHICLE_ID=${VEHICLE_ID}
      - API_KEY=${API_KEY}
      - SCAN_DURATION_SECONDS=30
      - POLL_INTERVAL=35

  telematics-edge:
    build: ./telematics-edge
    image: smart-truck/telematics-edge:latest
    privileged: true
    restart: always
    devices:
      - "/dev/serial0:/dev/serial0"
      - "/dev/i2c-1:/dev/i2c-1"
    volumes:
      - telematics-data:/data
    environment:
      - UDEV=1
      - WEBHOOK_URL=${WEBHOOK_URL}
      - VEHICLE_ID=${VEHICLE_ID}
      - API_KEY=${API_KEY}


  power-monitor:
    build: ./power-monitor
    image: smart-truck/power-monitor:latest
    privileged: true
    restart: always
    devices:
      - "/dev/i2c-1:/dev/i2c-1"
    volumes:
      - telematics-data:/data
    environment:
      - UDEV=1
      - WEBHOOK_URL=${WEBHOOK_URL}
      - VEHICLE_ID=${VEHICLE_ID}
      - API_KEY=${API_KEY}

volumes:
  telematics-data:
