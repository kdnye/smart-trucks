version: '2.1'
services:
  gps-multiplexer:
    build:
      context: .
      dockerfile: gps-multiplexer/Dockerfile
    privileged: true
    restart: always
    entrypoint: ["/usr/local/bin/start.sh"]
    devices:
      - "/dev/serial0:/dev/serial0"
      - "/dev/ttyAMA0:/dev/ttyAMA0"
      - "/dev/ttyS0:/dev/ttyS0"
    environment:
      - UDEV=1
      - GPS_SERIAL_DEVICE=/dev/serial0
      - GPS_SERIAL_CANDIDATES=/dev/serial0,/dev/ttyAMA0,/dev/ttyS0

  telematics-edge:
    build:
      context: .
      dockerfile: telematics-edge/Dockerfile
    privileged: true
    restart: always
    labels:
      io.balena.features.dbus: '1'
    devices:
      - "/dev/i2c-1:/dev/i2c-1"     # Grants access to the IMU
    volumes:
      - shared-sqlite:/data
    cpuset: "1,2"
    environment:
      - UDEV=1
      - VEHICLE_ID=${VEHICLE_ID}
      - DB_PATH=/data/telematics.db
      - GPS_SERIAL_DEVICE=tcp://gps-multiplexer:2947
      # Power saving: throttle IMU polling while parked (full 10Hz rate resumes
      # on motion). Larger = lower overnight draw, slower motion-wake latency.
      - IMU_PARKED_SAMPLE_INTERVAL_SECONDS=${IMU_PARKED_SAMPLE_INTERVAL_SECONDS:-1.0}

  power-monitor:
    build:
      context: .
      dockerfile: power-monitor/Dockerfile
    privileged: true
    restart: always
    devices:
      - "/dev/i2c-1:/dev/i2c-1"     # Grants access to the UPS HAT
    volumes:
      - shared-sqlite:/data
    cpuset: "3"
    environment:
      - UDEV=1
      - VEHICLE_ID=${VEHICLE_ID}
      - DB_PATH=/data/telematics.db
      - TELEMATICS_DB_PATH=/data/telematics.db
      - UPS_BATTERY_CAPACITY_MAH
      - UPS_MAX_EXPECTED_AMPS
      - UPS_GAIN_STRATEGY
      - UPS_BUS_VOLTAGE_RANGE_V
      # Power saving: sample fast (POWER_SAMPLE_INTERVAL_SECONDS) only near the
      # shutdown thresholds or on charging-state changes; otherwise back off to
      # the idle interval to cut I2C reads and SD-card writes. Brownout safety is
      # preserved because the fast band covers the approach to the cliff.
      - POWER_SAMPLE_INTERVAL_SECONDS=${POWER_SAMPLE_INTERVAL_SECONDS:-2}
      - POWER_SAMPLE_INTERVAL_IDLE_SECONDS=${POWER_SAMPLE_INTERVAL_IDLE_SECONDS:-20}
      - POWER_FAST_SAMPLE_SOC_MARGIN_PCT=${POWER_FAST_SAMPLE_SOC_MARGIN_PCT:-15}
      - POWER_FAST_SAMPLE_VOLTAGE_MARGIN_V=${POWER_FAST_SAMPLE_VOLTAGE_MARGIN_V:-0.20}
      - POWER_MONITOR_MODE=${POWER_MONITOR_MODE:-dummy}
      - POWER_MONITOR_HARDWARE_REQUIRED=${POWER_MONITOR_HARDWARE_REQUIRED:-false}
      # Set UPS=no (per-device balena variable) for hardware with no UPS HAT,
      # e.g. solar/MPPT boards. power-monitor then idles instead of crash-looping.
      - UPS=${UPS:-yes}

  ble-sensor:
    build:
      context: .
      dockerfile: ble-sensor/Dockerfile
    network_mode: host
    privileged: true
    restart: always
    labels:
      io.balena.features.dbus: '1'
    devices:
      - "/dev/i2c-1:/dev/i2c-1"     # Grants access to shared I2C bus
    volumes:
      - shared-sqlite:/data
    environment:
      - UDEV=1
      - ANONYMIZE_MAC=false
      - INCLUDE_DEVICE_NAME=true
      - VEHICLE_ID=${VEHICLE_ID}
      - SCAN_CONTENTION_BACKOFF_CAP_SECONDS=12
      - SCAN_CONTENTION_COOLDOWN_THRESHOLD=3
      - SCAN_DURATION_SECONDS=20
      - POLL_INTERVAL=60
      - TELEMATICS_DB_PATH=/data/telematics.db
      - UPLOAD_BATCH_SIZE=${BLE_UPLOAD_BATCH_SIZE:-25}
      # Power saving: stretch scan cadence + shorten scans when on battery (full
      # cadence resumes when charging). Tradeoff: slower BLE key-beacon wake
      # overnight. Set BLE_BATTERY_SAVER_ENABLED=false to disable.
      - BLE_BATTERY_SAVER_ENABLED=${BLE_BATTERY_SAVER_ENABLED:-true}
      - BLE_POLL_INTERVAL_DISCHARGING_SECONDS=${BLE_POLL_INTERVAL_DISCHARGING_SECONDS:-300}
      - BLE_POLL_INTERVAL_LOW_BATTERY_SECONDS=${BLE_POLL_INTERVAL_LOW_BATTERY_SECONDS:-900}
      - BLE_LOW_BATTERY_SOC_PCT=${BLE_LOW_BATTERY_SOC_PCT:-25}
      - BLE_SCAN_DURATION_LOW_POWER_SECONDS=${BLE_SCAN_DURATION_LOW_POWER_SECONDS:-10}

  sync-service:
    build:
      context: .
      dockerfile: sync-service/Dockerfile
    restart: always
    volumes:
      - shared-sqlite:/data
    environment:
      - VEHICLE_ID=${VEHICLE_ID}
      - WEBHOOK_URL=${WEBHOOK_URL}
      - MOTIVE_API_KEY=${MOTIVE_API_KEY}
      - DB_PATH=/data/telematics.db

  imu-calibration:
    build:
      context: .
      dockerfile: imu-calibration/Dockerfile
    privileged: true
    restart: "no"
    devices:
      - "/dev/i2c-1:/dev/i2c-1"
    volumes:
      - telematics_data:/data
    ports:
      - "8085:8080"
    environment:
      - UDEV=1
      - VEHICLE_ID=${VEHICLE_ID}
      - ENABLE_CALIBRATION=false
      - IMU_I2C_BUS
      - IMU_CALIBRATION_SAMPLE_INTERVAL_SECONDS

  ble-calibration:
    build:
      context: .
      dockerfile: ble-calibration/Dockerfile
    network_mode: host
    privileged: true
    restart: "no"
    labels:
      io.balena.features.dbus: '1'
    volumes:
      - telematics_data:/data
    environment:
      - UDEV=1
      - VEHICLE_ID=${VEHICLE_ID}
      - ENABLE_CALIBRATION=false
      - BLE_CALIBRATION_SCAN_DURATION_SECONDS
      - BLE_CALIBRATION_REFRESH_SECONDS

  health:
    build: ./health
    ports:
      - "8080:8080"
    restart: always
    environment:
      - SERVICE_NAME=smart-trucks

volumes:
  shared-sqlite:
  telematics_data:
